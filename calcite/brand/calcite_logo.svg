<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 84" width="360" height="84">
  <title>CALCITE — WEB DESIGN STUDIO</title>
  <desc>Calcite geometric wordmark logo with Japanese subtext</desc>
  <g transform="translate(16, 12)" stroke="#0d0d0d" stroke-width="2.4" fill="none" stroke-linecap="square" stroke-linejoin="miter">
    <!-- C -->
    <path d="M30,2 L6,2 L2,6 L2,48 L6,52 L30,52"/>
    <!-- A (no crossbar) -->
    <path d="M42,52 L54,2 L66,52"/>
    <!-- L -->
    <path d="M78,2 L78,52 L102,52"/>
    <!-- C -->
    <path d="M124,2 L106,2 L102,6 L102,48 L106,52 L124,52"/>
    <!-- I (gold serifs) -->
    <line x1="134" y1="2" x2="134" y2="52"/>
    <line x1="129" y1="2" x2="139" y2="2" stroke="#c4a55a" stroke-width="1.8"/>
    <line x1="129" y1="52" x2="139" y2="52" stroke="#c4a55a" stroke-width="1.8"/>
    <!-- T -->
    <line x1="149" y1="2" x2="177" y2="2"/>
    <line x1="163" y1="2" x2="163" y2="52"/>
    <!-- E -->
    <path d="M189,2 L211,2 M189,2 L189,52 L211,52 M189,27 L205,27"/>
  </g>
  <!-- Gold divider -->
  <line x1="18" y1="72" x2="228" y2="72" stroke="#c4a55a" stroke-width="1" opacity="0.35"/>
  <!-- Subtext -->
  <text x="18" y="82" font-family="'Noto Serif JP', 'Yu Mincho', serif" font-size="9.5" letter-spacing="3.5" fill="#0d0d0d" font-weight="700">カルサイト</text>
  <text x="145" y="82" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="7.5" letter-spacing="3" fill="#8a8a85" font-weight="400">WEB DESIGN STUDIO</text>
</svg>
