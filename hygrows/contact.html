<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | H&Y Grows Lab</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Contact Page Specific Styles */
    .contact-hero {
      text-align: center;
      padding: 120px 20px 40px;
      background: var(--bg-cream, #FFF9F5);
    }

    .contact-hero .section-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--primary, #2EBAC6);
      margin-bottom: 12px;
    }

    .contact-hero .section-title {
      font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--text-dark, #2D3436);
      margin-bottom: 16px;
    }

    .contact-hero .sub {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.95rem;
      color: var(--text-light, #636E72);
      line-height: 1.8;
    }

    /* Contact Form */
    .contact-form-section {
      padding: 60px 20px 100px;
      background: var(--bg-cream, #FFF9F5);
    }

    .contact-form {
      max-width: 640px;
      margin: 0 auto;
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
    }

    .form-group {
      margin-bottom: 28px;
    }

    .form-group label {
      display: block;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-dark, #2D3436);
      margin-bottom: 8px;
    }

    .form-group label .required {
      display: inline-block;
      background: var(--accent, #E8836B);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.95rem;
      color: var(--text-dark, #2D3436);
      background: var(--bg-light, #F0F8FA);
      border: 2px solid transparent;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      box-sizing: border-box;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary, #2EBAC6);
      box-shadow: 0 0 0 3px rgba(46, 186, 198, 0.12);
      background: #fff;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #B2BEC3;
    }

    .form-group textarea {
      min-height: 160px;
      resize: vertical;
    }

    .form-group select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23636E72' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 18px center;
      padding-right: 44px;
      cursor: pointer;
    }

    .form-submit {
      text-align: center;
      margin-top: 36px;
    }

    .form-submit .btn-primary {
      display: inline-block;
      padding: 16px 64px;
      font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: var(--accent, #E8836B);
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
      letter-spacing: 0.05em;
    }

    .form-submit .btn-primary:hover {
      background: #D9725C;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(232, 131, 107, 0.35);
    }

    @media (max-width: 640px) {
      .contact-form {
        padding: 32px 20px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner container">
      <a href="index.html" class="logo">
        <img src="img/logo.png" alt="H&Y Grows Lab">
      </a>
      <button class="hamburger" id="hamburger" aria-label="メニューを開く">
        <span></span><span></span><span></span>
      </button>
      <nav class="gnav" id="gnav">
        <a href="index.html">Home</a>
        <a href="aboutus.html">About Us</a>
        <a href="product.html">Product</a>
        <a href="services.html">Services</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html" class="btn btn-primary nav-cta current">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <div class="container">
      <a href="index.html">HOME</a> <span>&gt;</span> <span>Contact</span>
    </div>
  </div>

  <!-- Contact Hero -->
  <section class="contact-hero">
    <p class="section-label fadeUp">Contact</p>
    <h1 class="section-title fadeUp">Contact</h1>
    <p class="sub fadeUp">お気軽にお問い合わせください</p>
  </section>

  <!-- Contact Form -->
  <section class="contact-form-section">
    <form class="contact-form fadeUp" action="#" method="post">
      <div class="form-group">
        <label>メールアドレス <span class="required">必須</span></label>
        <input type="email" name="email" required placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>メールアドレス（確認用）<span class="required">必須</span></label>
        <input type="email" name="email_confirm" required placeholder="もう一度入力してください">
      </div>
      <div class="form-group">
        <label>氏名 <span class="required">必須</span></label>
        <input type="text" name="name" required placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label>お問い合わせ種別</label>
        <select name="type">
          <option value="" disabled selected>選択してください</option>
          <option value="product">商品について問い合わせ</option>
          <option value="corporate">法人関係者様のお問い合わせ</option>
          <option value="other">その他問い合わせ</option>
        </select>
      </div>
      <div class="form-group">
        <label>お問い合わせ内容 <span class="required">必須</span></label>
        <textarea name="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
      </div>
      <div class="form-submit">
        <button type="submit" class="btn btn-primary">送信</button>
      </div>
    </form>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner container">
      <div class="footer-brand">
        <img src="img/logo_black.png" alt="H&Y Grows Lab" class="footer-logo">
        <p class="footer-company">H&Y Grows Lab 株式会社</p>
        <p class="footer-address">〒107-0062 東京都港区南青山1丁目</p>
      </div>
      <nav class="footer-nav">
        <a href="product.html">Product</a>
        <a href="services.html">Services</a>
        <a href="blog.html">Blog</a>
        <a href="aboutus.html">About Us</a>
      </nav>
    </div>
    <div class="footer-copy">
      <p>&copy; H&Y Grows Lab 株式会社</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script>
    // Header scroll effect
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });

    // Hamburger menu
    const hamburger = document.getElementById('hamburger');
    const gnav = document.getElementById('gnav');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      gnav.classList.toggle('open');
    });

    // Intersection Observer fadeUp
    const fadeEls = document.querySelectorAll('.fadeUp');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    fadeEls.forEach(el => observer.observe(el));
  </script>

</body>
</html>
